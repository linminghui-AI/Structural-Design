<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>混凝土框架设计估算</title>
<style>
  :root {
    --blue: #378ADD; --blue-lt: #E6F1FB; --green: #3B6D11; --green-lt: #EAF3DE;
    --amber: #BA7517; --amber-lt: #FAEEDA; --red: #E24B4A; --red-lt: #FCEBEB;
    --gray: #888780; --gray-lt: #F1EFE8; --gray-md: #D3D1C7;
    --white: #fff; --text: #2C2C2A; --text2: #5F5E5A; --text3: #888780;
    --radius: 8px; --radius-sm: 4px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #F5F5F0; color: var(--text); font-size:14px; 
    -webkit-tap-highlight-color: transparent; user-select: none;
    max-width: 430px; margin: 0 auto; min-height: 100vh; overflow-x: hidden;
  }
  #app { display:flex; flex-direction:column; min-height:100vh; }
  .page { display:none; flex:1; overflow-y:auto; padding:8px 10px; padding-bottom:60px; }
  .page.active { display:block; }
  button,input,select { font-family:inherit; font-size:13px; }
  input[type=number], select {
    border:0.5px solid var(--gray-md); border-radius:var(--radius-sm); padding:6px 8px;
    background:var(--white); height:34px; min-width:0;
  }
  input[type=number] { width:60px; text-align:center; }
  input.xs-d { width:52px; height:28px; margin:1px; text-align:center; border:1px solid #ccc; border-radius:3px; font-size:13px; }
  input.xs-n { width:44px; height:28px; margin:1px; text-align:center; border:1px solid #ccc; border-radius:3px; font-size:13px; }
  select { width:auto; min-width:50px; }
  
  .btn { border:none; border-radius:var(--radius-sm); padding:8px 14px; cursor:pointer; font-weight:500; }
  .btn-primary { background:var(--blue); color:#fff; }
  .btn-sm { font-size:12px; padding:5px 10px; }
  .btn-link { background:none; color:var(--blue); font-size:12px; padding:4px 8px; }
  .btn-danger { background:var(--red); color:#fff; }
  
  .card { background:var(--white); border:0.5px solid var(--gray-md); border-radius:var(--radius); padding:10px 12px; margin-bottom:8px; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .card-title { font-size:13px; font-weight:500; color:var(--text); }
  .card-title-blue { color:var(--blue); }
  
  .row { display:flex; flex-wrap:wrap; align-items:center; gap:4px 8px; }
  .row-sm { display:flex; flex-wrap:wrap; align-items:center; gap:2px 6px; font-size:12px; }
  
  .metric { background:var(--white); border:0.5px solid var(--gray-md); border-radius:var(--radius-sm); padding:6px 10px; text-align:center; flex:1; min-width:80px; }
  .metric-val { font-size:18px; font-weight:500; }
  .metric-label { font-size:10px; color:var(--text3); }
  
  .tag-ok { color:var(--green); font-weight:500; font-size:11px; }
  .tag-ng { color:#d32f2f; font-weight:500; font-size:11px; }
  .tag-red { color:#d32f2f; font-weight:500; }
  .tag-green { color:var(--green); font-weight:500; }
  
  .section-row { background:var(--gray-lt); border-radius:var(--radius-sm); padding:6px 8px; margin-bottom:4px; font-size:12px; }
  .rpt-sec { padding:8px 0 4px; font-size:13px; border-bottom:1px solid var(--border); margin-bottom:6px; }
  .rpt-tbl { width:100%; font-size:11px; border-collapse:collapse; }
  .rpt-tbl td { padding:3px 4px; border-bottom:1px solid #eee; vertical-align:top; }
  .rpt-tbl td:first-child { width:90px; color:var(--text2); white-space:nowrap; }
  
  .model { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; display:none; align-items:center; justify-content:center; }
  .model.active { display:flex; }
  .model-box { background:var(--white); border-radius:12px; max-width:92vw; max-height:90vh; overflow-y:auto; padding:8px; width:100%; }
  .model-header { display:flex; justify-content:space-between; align-items:center; padding:4px 8px 8px; border-bottom:0.5px solid var(--gray-md); margin-bottom:8px; }
  
  .tab-bar { position:fixed; bottom:0; left:0; right:0; max-width:430px; margin:0 auto; display:flex; background:var(--white); border-top:0.5px solid #eee; height:52px; padding:6px 8px; gap:4px; z-index:50; }
  .tab-btn { flex:1; border:none; border-radius:8px; background:transparent; color:var(--text3); font-size:13px; font-weight:500; cursor:pointer; }
  .tab-btn.active { background:var(--blue); color:#fff; }
  
  .title-bar { background:var(--blue); color:#fff; text-align:center; padding:8px; font-size:14px; font-weight:500; border-radius:0 0 var(--radius) var(--radius); margin-bottom:8px; }
  
  #slab-diagram, #beam-diagram, #col-diagram { width:100%; min-height:100px; }
  
  .flex-col { display:flex; flex-direction:column; gap:8px; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; }
  
  pre.calculation { font-size:11px; line-height:1.5; color:var(--text2); white-space:pre-wrap; }
  
  .cross-section { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .xs-card { border:0.5px solid var(--gray-md); border-radius:var(--radius); padding:8px; text-align:center; min-width:90px; }
  
  svg text { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  svg .axis-label { font-size:9px; fill:var(--text3); }
  svg .beam-line { stroke:var(--blue); stroke-width:2.5; fill:none; }
  svg .col-dot { fill:#D85A30; }
  svg .m-line { stroke:var(--red); stroke-width:1.5; fill:none; }
  svg .v-line { stroke:var(--blue); stroke-width:1.5; fill:none; }
  svg .baseline { stroke:var(--gray-md); stroke-width:0.3; }
  
  input.w40 { width:46px; } input.w50 { width:58px; } input.w60 { width:70px; } input.w80 { width:90px; }
  select.w60 { width:60px; } select.w80 { width:80px; } select.w100 { width:100px; }
  
  .hint { font-size:11px; color:var(--text3); }
  label { font-size:12px; color:var(--text2); }
</style>
</head>
<body>
<div id="app">
  <div class="page active" id="page-param">
    <div class="title-bar">混凝土框架设计估算</div>
    <div class="card" style="padding:4px;position:relative;">
      <div id="view3d" style="width:100%;height:300px;background:var(--blue-lt);border-radius:6px;cursor:grab;overflow:hidden;touch-action:none;position:relative;"><span class="hint" style="position:absolute;top:4px;left:8px;z-index:5;pointer-events:none;">3D轴网 旋转缩放 点击构件</span></div>
      <span style="position:absolute;bottom:12px;right:12px;z-index:20;pointer-events:none;font-size:10px;color:var(--text3);background:rgba(255,255,255,0.9);padding:2px 6px;border-radius:3px;">点选对象可自定义截面及荷载</span>
      <div style="position:absolute;bottom:12px;left:12px;z-index:20;display:flex;flex-direction:column;gap:2px;">
        <button onclick="zoom3D(1)" style="width:28px;height:28px;border:1px solid #bbb;background:white;border-radius:4px;font-size:16px;line-height:1;cursor:pointer;padding:0;" title="放大">+</button>
        <button onclick="zoom3D(-1)" style="width:28px;height:28px;border:1px solid #bbb;background:white;border-radius:4px;font-size:16px;line-height:1;cursor:pointer;padding:0;" title="缩小">−</button>
      </div>
    </div>
    <div style="font-size:11px;text-align:center;color:var(--blue);margin:2px 0;" id="p1-selected"></div>
    <div class="card" id="card-grid">
      <div class="card-header"><span class="card-title">轴网参数</span><button class="btn btn-link" onclick="resetGrid()">重置</button></div>
      <div class="row-sm"><label>横轴跨 mm</label><input type="number" id="gx1" value="6000" class="w60"><input type="number" id="gx2" value="6000" class="w60"><input type="number" id="gx3" value="" placeholder="--" class="w60"></div>
      <div class="row-sm" style="margin-top:4px;"><label>纵轴跨 mm</label><input type="number" id="gy1" value="6000" class="w60"><input type="number" id="gy2" value="6000" class="w60"><input type="number" id="gy3" value="" placeholder="--" class="w60"></div>
      <div class="row-sm" style="margin-top:4px;"><label>楼层高mm</label><input type="number" id="storyH" value="3000" class="w60"><label>楼层数</label><input type="number" id="nStory" value="2" class="w60"></div>
      <div style="margin-top:6px;"><button class="btn btn-primary btn-sm" onclick="applyGrid()">应用</button></div>
    </div>
    <div class="card" id="card-section">
      <div class="card-header"><span class="card-title">截面参数</span><button class="btn btn-link" onclick="resetSection()">重置</button></div>
      <div class="row-sm"><label>砼</label><select id="concGrade" class="w60"><option>C25</option><option selected>C30</option><option>C35</option></select><label>梁b</label><input type="number" id="beamB" value="250" class="w50"><label>h</label><input type="number" id="beamH" value="500" class="w50"><label>mm</label></div>
      <div class="row-sm" style="margin-top:4px;"><label>柱b</label><input type="number" id="colB" value="400" class="w50"><label>h</label><input type="number" id="colH" value="400" class="w50"><label>板厚</label><input type="number" id="slabT" value="120" class="w50"><label>mm</label></div>
      <div style="margin-top:6px;"><button class="btn btn-primary btn-sm" onclick="applySection()">应用</button></div>
    </div>
    <div class="card" id="card-load">
      <div class="card-header"><span class="card-title">荷载参数</span><button class="btn btn-link" onclick="resetLoad()">重置</button></div>
      <div class="row-sm"><label>板自重</label><span id="slabSelfWt">3.12</span><label>+恒</label><input type="number" id="extraDL" value="2.0" class="w50"><label>kN/m2</label></div>
      <div class="row-sm" style="margin-top:4px;"><label>活载</label><input type="number" id="liveLL" value="2.0" class="w50"><label>系数</label><select id="loadCombo" class="w80" onchange="onLoadCombo(this.value)"><option value="1.3+1.5">1.3+1.5</option><option value="1.2+1.4">1.2+1.4</option><option value="custom">自定义</option></select></div>
      <div id="customCombo" style="display:none;" class="row-sm"><input type="number" id="gammaG" value="1.3" class="w50" step="0.05"><input type="number" id="gammaQ" value="1.5" class="w50" step="0.05"></div>
      <div class="row-sm" style="margin-top:4px;"><label>墙砖类型</label><select id="wallType" onchange="calcWallLoad()"><option value="19">黏土砖19</option><option value="15">多孔砖15</option><option value="11">空心砖11</option><option value="7">加气砼7</option></select><label>厚</label><select id="wallThick" onchange="calcWallLoad()"><option value="120">120</option><option value="180">180</option><option value="240" selected>240</option></select><label>面层</label><select id="wallFinish" onchange="calcWallLoad()"><option value="0.4">水泥砂浆0.4</option><option value="0.6" selected>真石漆0.6</option><option value="0.8">瓷砖0.8</option></select></div>
      <div class="row-sm" style="margin-top:4px;"><label>门窗折减</label><input type="number" id="wallReduction" value="1.0" class="w50" step="0.05" onchange="calcWallLoad()"><span id="wallLoadResult" style="font-weight:500;color:var(--text);"></span></div>
      <div style="margin-top:6px;"><button class="btn btn-primary btn-sm" onclick="applyLoad()">应用</button></div>
    </div>
  </div>

  <div class="page" id="page-slab">
    <div class="title-bar">板截面验算</div>
    <div class="card">
      <div class="card-header"><span class="card-title">板平面图</span><span class="hint">点击板格选择 | 楼层:</span><select id="slabFloorSel" onchange="state.slabFloor=+this.value;renderSlabPage()" style="width:50px"></select></div>
      <div id="slab-diagram" style="min-height:120px;"></div>
      <div style="font-size:10px;color:var(--text3);">固=固结(邻板) 铰=铰接(无边)</div>
    </div>
    <div class="card" id="slab-force-card">
      <div class="card-header"><span class="card-title card-title-blue">内力计算</span><span id="slab-info" class="hint"></span></div>
      <div id="slab-force-detail"></div>
    </div>
    <div class="card" id="slab-verify-card">
      <div class="card-header"><span class="card-title card-title-blue">配筋及验算</span></div>
      <div id="slab-verify-detail"></div>
      <div id="slab-moment-svg" style="margin-top:8px;"></div>
      <div style="margin-top:8px;"><button class="btn btn-primary btn-sm" style="width:100%" onclick="showCalcReport('slab')">查看详细计算书</button></div>
    </div>
  </div>

  <div class="page" id="page-beam">
    <div class="title-bar">梁截面验算</div>
    <div class="card">
      <div class="card-header"><span class="card-title">梁平面图</span><span class="hint">点击梁段选择 | 楼层:</span><select id="beamFloorSel" onchange="state.beamFloor=+this.value;renderBeamPage()" style="width:50px"></select></div>
      <div id="beam-diagram" style="min-height:120px;"></div>
      <div style="font-size:10px;color:var(--text3);">o柱 —梁 选中:蓝色</div>
    </div>
    <div class="card" id="beam-force-card">
      <div class="card-header"><span class="card-title card-title-blue">内力计算</span><span id="beam-info" class="hint"></span></div>
      <div id="beam-force-detail"></div>
    </div>
    <div class="card" id="beam-verify-card">
      <div class="card-header"><span class="card-title card-title-blue">配筋与验算</span></div>
      <div id="beam-verify-detail"></div>
      <div style="margin-top:8px;"><button class="btn btn-primary btn-sm" style="width:100%" onclick="showCalcReport('beam')">查看详细计算书</button></div>
    </div>
  </div>

  <div class="page" id="page-col">
    <div class="title-bar">柱截面验算</div>
    <div class="card">
      <div class="card-header"><span class="card-title">柱平面图</span><span class="hint">点击柱位选择</span></div>
      <div id="col-diagram" style="min-height:120px;"></div>
      <div style="font-size:10px;color:var(--text3);">橙=角/边柱 蓝=中柱</div>
    </div>
    <div class="card" id="col-force-card">
      <div class="card-header"><span class="card-title card-title-blue">内力计算</span><span id="col-info" class="hint"></span></div>
      <div id="col-force-detail"></div>
    </div>
    <div class="card" id="col-verify-card">
      <div class="card-header"><span class="card-title card-title-blue">配筋与验算</span></div>
      <div id="col-verify-detail"></div>
      <div style="margin-top:8px;"><button class="btn btn-primary btn-sm" style="width:100%" onclick="showCalcReport('col')">查看详细计算书</button></div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchPage('param')">参数</button>
  <button class="tab-btn" onclick="switchPage('slab')">板</button>
  <button class="tab-btn" onclick="switchPage('beam')">梁</button>
  <button class="tab-btn" onclick="switchPage('col')">柱</button>
</div>

<div class="model" id="report-modal" onclick="if(event.target===this)closeReport()">
  <div class="model-box" style="max-height:85vh;">
    <div class="model-header"><span class="card-title card-title-blue" id="report-title"></span><button class="btn btn-link" onclick="closeReport()">✕</button></div>
    <pre class="calculation" id="report-content"></pre>
    <button class="btn btn-primary btn-sm" style="width:100%" onclick="closeReport()">关闭</button>
  </div>
</div>

<div class="model" id="xs-modal" onclick="if(event.target===this)closeXS()">
  <div class="model-box" style="max-height:90vh;">
    <div class="model-header"><span class="card-title card-title-blue" id="xs-title"></span><button class="btn btn-link" onclick="closeXS()">✕</button></div>
    <div id="xs-content"></div>
  </div>
</div>

<div class="model" id="popup-modal" onclick="if(event.target===this)closePopup()">
  <div class="model-box" style="max-width:320px;">
    <div id="popup-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

// 线性插值查表
function getCoef(table, ratio){
  let keys=Object.keys(table).map(Number).sort((a,b)=>a-b);
  if(ratio<=keys[0]) return table[keys[0]];
  if(ratio>=keys[keys.length-1]) return table[keys[keys.length-1]];
  for(let i=0;i<keys.length-1;i++){
    if(ratio>=keys[i]&&ratio<=keys[i+1]){
      let t=(ratio-keys[i])/(keys[i+1]-keys[i]);
      let a=table[keys[i]],b=table[keys[i+1]];
      return a.map((v,j)=>v+(b[j]-v)*t);
    }
  }
  return table[keys[0]];
}

// 根据边界条件选择表格并查系数
// 新格式: SLAB_COEF[type][ratio] = [β_f, Mx中, My中, Mx支, My支]
function slabCoefTable(b, ratio){
  let nFixed=(b.top?1:0)+(b.bot?1:0)+(b.left?1:0)+(b.right?1:0);
  let oppFixed=(b.top&&b.bot)||(b.left&&b.right);
  let adjFixed=(!oppFixed && nFixed>=2 && ((b.top&&b.right)||(b.top&&b.left)||(b.bot&&b.right)||(b.bot&&b.left)));
  let table,typeName;
  if(nFixed===4){table=SLAB_COEF.allFixed;typeName='四边固结';}
  else if(nFixed===3){table=SLAB_COEF.threeFixedHinge;typeName='三固一铰';}
  else if(nFixed===2&&oppFixed){table=SLAB_COEF.oppositeFixed;typeName='对固对铰';}
  else if(nFixed===2&&adjFixed){table=SLAB_COEF.adjacentFixed;typeName='邻固邻铰';}
  else if(nFixed===1){table=SLAB_COEF.oneFixed;typeName='一固三铰';}
  else {table=SLAB_COEF.allSimple;typeName='四边简支';}
  let coef=table?getCoef(table,ratio):[0.00406,0.0368,0.0368,0,0];
  // coef = [β_f, Mx中, My中, Mx支, My支]
  return {coef,typeName,table};
}

function getSpans(arr){
  let s=[0],cum=0;
  for(let v of arr){ if(v>0){cum+=v;s.push(cum);} }
  return s;
}
function getBeams(xSp,ySp){
  let beams=[],hSp=getSpans(xSp),vSp=getSpans(ySp);
  let hl=['A','B','C','D','E'],vl=['1','2','3','4','5'];
  for(let r=0;r<vSp.length;r++) for(let c=0;c<hSp.length-1;c++){
    beams.push({id:hl[c]+'-'+vl[r],x1:hSp[c],y1:vSp[r],x2:hSp[c+1],y2:vSp[r],dir:'h',axis:hl[c],span:r});
  }
  for(let r=0;r<vSp.length-1;r++) for(let c=0;c<hSp.length;c++){
    beams.push({id:hl[c]+vl[r]+'-'+hl[c]+vl[r+1],x1:hSp[c],y1:vSp[r],x2:hSp[c],y2:vSp[r+1],dir:'v',axis:vl[r],span:c});
  }
  return beams;
}
function getSlabs(xSp,ySp){
  let slabs=[],hSp=getSpans(xSp),vSp=getSpans(ySp);
  for(let r=0;r<vSp.length-1;r++) for(let c=0;c<hSp.length-1;c++){
    slabs.push({id:(r*vSp.length-r+c),lx:hSp[c+1]-hSp[c],ly:vSp[r+1]-vSp[r],x1:hSp[c],y1:vSp[r]});
  }

}
function getCols(xSp,ySp){
  let cols=[],hSp=getSpans(xSp),vSp=getSpans(ySp),hl=['A','B','C','D','E'],vl=['1','2','3','4','5'];
  for(let r=0;r<vSp.length;r++) for(let c=0;c<hSp.length;c++){
    let type=(r===0||r===vSp.length-1)&&(c===0||c===hSp.length-1)?'corner':
      (r===0||r===vSp.length-1||c===0||c===hSp.length-1)?'edge':'interior';
    cols.push({id:hl[c]+vl[r],type,x:hSp[c],y:vSp[r]});
  }
  return cols;
}

function slabBoundary(si){
  let slabs=getSlabs(state.grid.xSpans,state.grid.ySpans),s=slabs[si];
  if(!s) return {top:false,bot:false,left:false,right:false};
  let hasTop=false,hasBot=false,hasLeft=false,hasRight=false;
  for(let i=0;i<slabs.length;i++){
    if(i===si) continue;
    let o=slabs[i];
    // y grows downward: top edge is s.y1 (smaller y), bottom edge is s.y1+s.ly (larger y)
    // Another slab above us means its bottom edge touches our top edge
    if(Math.abs(o.x1-s.x1)<5&&Math.abs((o.y1+o.ly)-s.y1)<5) hasTop=true;
    // Another slab below us means its top edge touches our bottom edge
    if(Math.abs(o.x1-s.x1)<5&&Math.abs(o.y1-(s.y1+s.ly))<5) hasBot=true;
    // x grows rightward
    if(Math.abs(o.y1-s.y1)<5&&Math.abs(o.x1-(s.x1+s.lx))<5) hasRight=true;
    if(Math.abs(o.y1-s.y1)<5&&Math.abs((o.x1+o.lx)-s.x1)<5) hasLeft=true;
  }
  return {top:hasTop,bot:hasBot,left:hasLeft,right:hasRight};
}

function slabCalc(si){
  let s=getSlabs(state.grid.xSpans,state.grid.ySpans)[si];
  if(!s) return null;
  let lx=s.lx/1000,ly=s.ly/1000;//m
  let swapped=false;
  if(lx>ly){let t=lx;lx=ly;ly=t;swapped=true;}
  let g=state.section,ld=state.loads,m=MAT[g.concGrade];
  let fl=state.slabFloor||1;
  let ov=slabOv(s,fl);
  let oSlabT=(ov&&ov.t)?ov.t:g.slabT;
  let slabSW=oSlabT*26/1000;
  let oDL=(ov&&ov.extraDL!=null)?ov.extraDL:ld.extraDL;
  let oLL=(ov&&ov.liveLL!=null)?ov.liveLL:ld.liveLL;
  let qd=(slabSW+oDL)*ld.gammaG+oLL*ld.gammaQ;
  let qq=slabSW+oDL+0.5*oLL;
  let ratio=ly/lx,isOneWay=ratio>3;            // ratio = 长/短(≥1): 仅用于单向判定与报告显示。按 GB 50010: >3 按单向, ≤3 宜按双向
  let ratioTab=lx/ly;                          // 短/长(≤1): 喂给系数表 SLAB_COEF (其轴为 短跨/长跨)
  let b=slabBoundary(si);
  let Mb={};
  let h0=oSlabT-20; // X向有效高度 (短跨/底层), 保留用于兼容
  let h0Y=oSlabT-30; // Y向有效高度 (长跨/上层), 比X向小约10mm
  if(swapped){let t=h0;h0=h0Y;h0Y=t;} // swapped时X向为长跨, Y向为短跨, 互换
  let r=state.slabRebar;

  if(isOneWay){
    // 单向板: 短跨方向受弯 (连续板 → 支座负弯矩取 qd·lx²/10). swapped时短跨是Y方向
    let Mmax=qd*lx*lx/10, Msup=qd*lx*lx/10;
    if(swapped){
      Mb={MxL_sup:0,MxR_sup:0,Mx_mid:0, MyT_sup:Msup,MyB_sup:Msup,My_mid:Mmax,
        borderType:'单向板(ly/lx>3)',ax_mid:0,ay_mid:0.1,
        axL_sup:0,axR_sup:0,ayT_sup:0.1,ayB_sup:0.1,betaDef:0.008};
    }else{
      Mb={MxL_sup:Msup,MxR_sup:Msup,Mx_mid:Mmax, MyT_sup:0,MyB_sup:0,My_mid:0,
        borderType:'单向板(ly/lx>3)',ax_mid:0.1,ay_mid:0,
        axL_sup:0.1,axR_sup:0.1,ayT_sup:0,ayB_sup:0,betaDef:0.008};
    }
  }else{
    // 双向板查表
    let {coef,typeName}=slabCoefTable(b,ratioTab);
    let betaDef=coef[0],ax=coef[1],ay=coef[2],axs=coef[3],ays=coef[4];
    // Fix: swapped时对调系数方向 (αx=短跨,αy=长跨, 但Mx为X向,My为Y向)
    if(swapped){let t=ax;ax=ay;ay=t;t=axs;axs=ays;ays=t;}
    // 跨中弯矩 (含泊松比 μ=0.2 修正)
    let Mx_mid=ax*qd*lx*lx+0.2*(ay*qd*lx*lx);
    let My_mid=ay*qd*lx*lx+0.2*(ax*qd*lx*lx);
    // 支座弯矩：逐边判铰（不叠加泊松比 μ=0.2 修正）
    let MxL=b.left?(axs*qd*lx*lx):0;
    let MxR=b.right?(axs*qd*lx*lx):0;
    let MyT=b.top?(ays*qd*lx*lx):0;
    let MyB=b.bot?(ays*qd*lx*lx):0;
    Mb={MxL_sup:MxL,MxR_sup:MxR,Mx_mid,MyT_sup:MyT,MyB_sup:MyB,My_mid,
      borderType:typeName,ax_mid:ax+0.2*ay,ay_mid:ay+0.2*ax,
      axL_sup:b.left?axs:0,axR_sup:b.right?axs:0,
      ayT_sup:b.top?ays:0,ayB_sup:b.bot?ays:0,
      ax_raw:ax,ay_raw:ay,axs_raw:axs,ays_raw:ays,betaDef};
  }
  // 取配筋控制弯矩: X向支座取大、Y向支座取大
  let MxSup=Math.max(Mb.MxL_sup||0,Mb.MxR_sup||0);
  let MySup=Math.max(Mb.MyT_sup||0,Mb.MyB_sup||0);

  let AsXtop=Math.PI*Math.pow(r.XtopD,2)/4*(1000/r.XtopS);
  let AsXbot=Math.PI*Math.pow(r.XbotD,2)/4*(1000/r.XbotS);
  let AsYtop=Math.PI*Math.pow(r.YtopD,2)/4*(1000/r.YtopS);
  let AsYbot=Math.PI*Math.pow(r.YbotD,2)/4*(1000/r.YbotS);
  let asReq=(M,h)=>M*1e6/(0.9*m.fy*h);
  let rhoMin=0.2;
  let check=(As,req,d,s,h)=>({req:Math.round(req),actual:Math.round(As),rho:(As/(1000*h)*100).toFixed(2),
    ok:(As>=req&&As/(1000*h)*100>=rhoMin)?'OK':'NG',d:d||8,s:s||150});

  let Bc=m.Ec*Math.pow(oSlabT,3)/11.52;
  let betaF=Mb.betaDef||0.00257;
  let fDef=betaF*qq*Math.pow(lx,4)*1e9/Bc;
  let _l0=Math.min(s.lx,s.ly);
  let fLim=_l0<7000?_l0/200:(_l0<=9000?_l0/250:_l0/300);
  // 两个方向裂缝验算（跨中底面）, 取不利
  let MqXc=(Mb.ax_mid||0.02)*qq*lx*lx;
  let sigmaSkX=MqXc*1e6/(0.87*h0*AsXbot+0.01);
  let rhoTeX=AsXbot/(0.5*1000*oSlabT);if(rhoTeX<0.01)rhoTeX=0.01;
  let psiX=1.1-0.65*m.ftk/(rhoTeX*Math.max(sigmaSkX,1));psiX=Math.max(0.2,Math.min(1,psiX));
  let d_eqX=r.XbotD;
  let wMaxX=1.9*psiX*sigmaSkX/2e5*(1.9*15+0.08*d_eqX/rhoTeX);
  let MqYc=(Mb.ay_mid||0.02)*qq*lx*lx;
  let sigmaSkY=MqYc*1e6/(0.87*h0Y*AsYbot+0.01);
  let rhoTeY=AsYbot/(0.5*1000*oSlabT);if(rhoTeY<0.01)rhoTeY=0.01;
  let psiY=1.1-0.65*m.ftk/(rhoTeY*Math.max(sigmaSkY,1));psiY=Math.max(0.2,Math.min(1,psiY));
  let d_eqY=r.YbotD;
  let wMaxY=1.9*psiY*sigmaSkY/2e5*(1.9*15+0.08*d_eqY/rhoTeY);
  let wMax=Math.max(wMaxX,wMaxY);

  // 按6位置承载力
  let Xtop=check(AsXtop,asReq(MxSup,h0),r.XtopD,r.XtopS,h0),Xbot=check(AsXbot,asReq(Mb.Mx_mid,h0),r.XbotD,r.XbotS,h0);
  let Ytop=check(AsYtop,asReq(MySup,h0Y),r.YtopD,r.YtopS,h0Y),Ybot=check(AsYbot,asReq(Mb.My_mid,h0Y),r.YbotD,r.YbotS,h0Y);
  let Xright=check(AsXtop,asReq(Mb.MxR_sup||0,h0),r.XtopD,r.XtopS,h0);
  let Xleft=check(AsXtop,asReq(Mb.MxL_sup||0,h0),r.XtopD,r.XtopS,h0);
  let YtopV=check(AsYtop,asReq(Mb.MyT_sup||0,h0Y),r.YtopD,r.YtopS,h0Y);
  let YbotV=check(AsYtop,asReq(Mb.MyB_sup||0,h0Y),r.YtopD,r.YtopS,h0Y);

  return {lx:lx*1000,ly:ly*1000,lx_m:lx,ly_m:ly,qd,qq,isOneWay,ratio,Mb,slabT:oSlabT,concGrade:g.concGrade,h0,h0Y,
    MxSup:asReq(MxSup,h0),MxmidReq:asReq(Mb.Mx_mid,h0),MySup:asReq(MySup,h0Y),MymidReq:asReq(Mb.My_mid,h0Y),
    Xtop,Xbot,Ytop,Ybot,Xleft,Xright,YtopV,YbotV,
    Bc,fDef,fLim,defOK:fDef<=fLim,    wMax,wMaxX,wMaxY,wOK:wMax<=0.3,boundary:b,
    slabT:oSlabT,slabSW,oDL,oLL,gammaG:ld.gammaG,gammaQ:ld.gammaQ,qq,rhoMin:0.2,
    ft:m.ft,ftk:m.ftk,Ec:m.Ec,betaF,
    MqX:MqXc,MqY:MqYc,sigmaSkX,sigmaSkY,psiX,psiY,rhoTeX,rhoTeY,d_eqX,d_eqY,
    sigmaSk:sigmaSkX,rhoTe:rhoTeX,psi:psiX,d_eq:d_eqX,Mq:MqXc // compat
  };
}


function beamCalc(bi){
  let beams=getBeams(state.grid.xSpans,state.grid.ySpans);
  let b=beams.find(x=>x.id===bi);
  if(!b) return null;
  let L=(b.x2-b.x1)/1000;
  if(b.dir==='v') L=(b.y2-b.y1)/1000;
  let fl=state.beamFloor||1;
  let g=state.section,ld=state.loads,m=MAT[g.concGrade];
  // Read per-beam per-floor override

  let beamSW=oBeamB*oBeamH*26/1e6;

  let wd=slabW+beamSW*ld.gammaG+wallW*ld.gammaG;  // Fix A: 梁自重/墙载为裸恒载, 需乘 γG (slabW 已含 γG)
  let slabTv=getSlabTAt(bi)||g.slabT;

  let slabWq=(slabSW+state.loads.extraDL+0.5*state.loads.liveLL)/((slabSW+state.loads.extraDL)*state.loads.gammaG+state.loads.liveLL*state.loads.gammaQ)*slabW||0;
  let wq=slabWq+beamSW+wallW;

  if(st==='fixed'){M1=wd*L*L/12;Mmid=wd*L*L/24;M2=wd*L*L/12;V1=wd*L/2;V2=wd*L/2;}
  else if(st==='pinned'){Mmid=wd*L*L/8;V1=wd*L/2;V2=wd*L/2;}
  else{M1=wd*L*L/8;Mmid=9*wd*L*L/128;V1=5*wd*L/8;V2=3*wd*L/8;}
  let Vmax=Math.max(V1,V2);
  let h0=oBeamH-40;
  let asReq=(M,h)=>M*1e6/(0.9*m.fy*h);
  let r=state.beamRebar;
  let barA=(d,n)=>Math.PI*d*d/4*n;
  let AsS1T=barA(r.sup1TopD,r.sup1TopN)+barA(r.sup1Top2D||10,r.sup1Top2N||0),AsS1B=barA(r.sup1BotD,r.sup1BotN)+barA(r.sup1Bot2D||10,r.sup1Bot2N||0);
  let AsMidT=barA(r.midTopD,r.midTopN)+barA(r.midTop2D||10,r.midTop2N||0),AsMidB=barA(r.midBotD,r.midBotN)+barA(r.midBot2D||10,r.midBot2N||0);
  let AsS2T=barA(r.sup2TopD,r.sup2TopN)+barA(r.sup2Top2D||10,r.sup2Top2N||0);
  let AsS2B=barA(r.sup2BotD||10,r.sup2BotN||0)+barA(r.sup2Bot2D||10,r.sup2Bot2N||0);
  let AsStir=2*Math.PI*Math.pow(r.stirD,2)/4;
  let Vc=0.7*m.ft*oBeamB*h0/1000;
  let Vs=360*AsStir*h0/r.stirS/1000;
  let Vu=Vc+Vs;
  let Vlim=0.25*m.fc*oBeamB*h0/1000;
  let rhoMin=0.2,rhoMax=0.518*m.fc/360*100;
  let checkB=(As,M)=>Math.round(M*1e6/(0.9*360*h0));
  let Mq1,Mqmid;
  if(st==='fixed'){Mq1=wq*L*L/12;Mqmid=wq*L*L/24;}
  else if(st==='pinned'){Mq1=0;Mqmid=wq*L*L/8;}
  else{Mq1=wq*L*L/8;Mqmid=9*wq*L*L/128;}
  let AsCrack=st==='pinned'?AsMidB:AsS1T;
  let sigmaSk=(Mq1||Mqmid)*1e6/(0.87*h0*AsCrack+0.01);
  let rhoTe=AsCrack/(0.5*oBeamB*oBeamH);if(rhoTe<0.01)rhoTe=0.01;
  let psi=1.1-0.65*m.ftk/(rhoTe*Math.max(sigmaSk,1));psi=Math.max(0.2,Math.min(1,psi));
  let cs=20+r.stirD,d_eq=st==='pinned'?r.midBotD:r.sup1TopD;
  let wMax=1.9*psi*sigmaSk/2e5*(1.9*cs+0.08*d_eq/rhoTe);
  let alphaE=2e5/m.Ec,rhoB=AsS1T/(oBeamB*h0);

  let betaF=st==='fixed'?1/384:st==='pinned'?5/384:1/185;
  let fDef=betaF*wq*Math.pow(L,4)*1e12/B;
  let fLim=L*1000/250;

  let fm='wd×L²/',Km=12;if(st==='pinned'){Km=8;fm='';}
  else if(st==='mixed'){Km=128/9;}
  let fm1=st==='fixed'?'wd×L²/12':st==='pinned'?'0':'wd×L²/8';
  let fmMid=st==='fixed'?'wd×L²/24':st==='pinned'?'wd×L²/8':'9wd×L²/128';
  let fm2=st==='fixed'?'wd×L²/12':st==='pinned'?'0':'0';
  let fmV=st==='mixed'?'5wd×L/8':'wd×L/2';
  let formula_M1=fm1+'='+wd.toFixed(2)+'×'+L.toFixed(1)+'²/'+(st==='fixed'?12:st==='pinned'?'∞':8);
  let formula_Mmid=fmMid+'='+wd.toFixed(2)+'×'+L.toFixed(1)+'²/'+(st==='fixed'?24:st==='pinned'?8:128/9);
  let formula_M2=fm2+'='+wd.toFixed(2)+'×'+L.toFixed(1)+'²/'+(st==='fixed'?12:'-');
  let formula_V=fmV+'='+wd.toFixed(2)+'×'+L.toFixed(1)+(st==='mixed'?'×5/8':'/2');
  let K_mq=Km,AsRef=Math.round(st==='pinned'?AsMidB:AsS1T),Asv=2*Math.PI*Math.pow(r.stirD,2)/4;
  let MqB=wq*Math.pow(L,2)/K_mq;
  let sigmaSkB=MqB*1e6/(0.87*h0*AsRef+0.01);
  let rhoTeB=AsRef/(0.5*oBeamB*oBeamH);if(rhoTeB<0.01)rhoTeB=0.01;
  let psiB=1.1-0.65*m.ftk/(rhoTeB*Math.max(sigmaSkB,1));psiB=Math.max(0.2,Math.min(1,psiB));
  let d_eqB=st==='pinned'?r.midBotD:r.sup1TopD,csB=20+r.stirD;
  let wMaxB=1.9*psiB*sigmaSkB/2e5*(1.9*csB+0.08*d_eqB/rhoTeB);
  return {L:L*1000,wd,wq,beamB:oBeamB,beamH:oBeamH,h0,concGrade:g.concGrade,
    M1,Mmid,M2,V1,V2,Vmax,st,
    s1TopReq:checkB(AsS1T,M1),s1TopAct:Math.round(AsS1T),s1BotAct:Math.round(AsS1B),
    midTopReq:checkB(AsMidT,Math.max(Mmid,0)),midTopAct:Math.round(AsMidT),midBotReq:checkB(AsMidB,Mmid),midBotAct:Math.round(AsMidB),
    s2TopReq:checkB(AsS2T,M2),s2TopAct:Math.round(AsS2T),
    Vc,Vs,Vu,Vmax,Vlim,shearOK:Vu>=Vmax&&Vmax<=Vlim,
    slabW,beamSW,wallW,gammaG:ld.gammaG,fc:m.fc,ft:m.ft,ftk:m.ftk,Ec:m.Ec,
    Asv,stirS:r.stirS,stirD:r.stirD,
    wMax,wOK:Math.max(wMax,wMaxB||0)<=0.3,wMaxB,sigmaSkB,psiB,rhoTeB,d_eqB,csB,AsRef,K_mq,MqB,
    fDef,fLim,defOK:fDef<=fLim,Bs,B,alphaE,rhoB,betaFB:betaF,psiB,
    formula_M1,formula_Mmid,formula_M2,formula_V,
    slabDetail
  };
}

function getSlabTAt(beamId){
  let beams=getBeams(state.grid.xSpans,state.grid.ySpans),slabs=getSlabs(state.grid.xSpans,state.grid.ySpans);
  let bobj=beams.find(x=>x.id===beamId);if(!bobj) return null;
  let fl=state.beamFloor||1;
  for(let s of slabs){
    let onBeam=false;
    if(bobj.dir==='h'&&Math.abs(bobj.y1-s.y1)<1) onBeam=true;
    if(bobj.dir==='v'&&Math.abs(bobj.x1-s.x1)<1) onBeam=true;
    if(!onBeam) continue;
    let ov=slabOv(s,fl);return ov&&ov.t?ov.t:null;
  }
  return null;
}
function calcSlabToBeam(beamId){
  let beams=getBeams(state.grid.xSpans,state.grid.ySpans),slabs=getSlabs(state.grid.xSpans,state.grid.ySpans);
  let bobj=beams.find(x=>x.id===beamId);
  if(!bobj) return 0;
  let g=state.section,ld=state.loads;
  let fl=state.beamFloor||1;
  let total=0,detail=[];
  for(let s of slabs){
    let onBeam=false,edgeLabel='';
    let lx=(s.lx/1000),ly=(s.ly/1000);
    if(bobj.dir==='h'){
      let onTop=Math.abs(bobj.y1-s.y1)<1;
      let onBot=Math.abs(bobj.y1-(s.y1+s.ly))<1;
      let xOverlap=bobj.x2>s.x1&&bobj.x1<s.x1+s.lx;
      if((onTop||onBot)&&xOverlap){onBeam=true;edgeLabel=onTop?'上边':'下边';}
    }
    if(bobj.dir==='v'){
      let onLeft =Math.abs(bobj.x1-s.x1)<1;
      let onRight=Math.abs(bobj.x1-(s.x1+s.lx))<1;
      let yOverlap=bobj.y2>s.y1&&bobj.y1<s.y1+s.ly;
      if((onLeft||onRight)&&yOverlap){onBeam=true;edgeLabel=onLeft?'左边':'右边';}
    }
    if(!onBeam) continue;
    // 逐板读取覆写(t/DL/LL), 使梁荷载与板自定义一致
    let ovS=slabOv(s,fl),oT=(ovS&&ovS.t)?ovS.t:g.slabT;
    let oDL=(ovS&&ovS.extraDL!=null)?ovS.extraDL:ld.extraDL;
    let oLL=(ovS&&ovS.liveLL!=null)?ovS.liveLL:ld.liveLL;
    let slabSW=oT*26/1000;
    let qd=(slabSW+oDL)*ld.gammaG+oLL*ld.gammaQ;
    let ratio=Math.max(lx,ly)/Math.min(lx,ly);
    let lx2=Math.min(lx,ly),ly2=Math.max(lx,ly),alpha=lx2/(2*ly2);
    let isShortBeam=(bobj.dir==='h'&&lx<=ly)||(bobj.dir==='v'&&ly<=lx);
    let contrib=0,formula='';
    if(ratio>3){
      // 单向板：全部荷载传给短向梁，单根50%
      let totalLoad=qd*lx*ly;
      let beamLen=(bobj.dir==='h'?lx:ly);
      if(isShortBeam){contrib=0.5*totalLoad/beamLen;formula='单向板 qd×lx×ly/(2L)'}
      else {contrib=0;formula='单向板 — 长向梁不受力'}
    }else{
      // 双向板：45° 传力法等效均布荷载（按弯矩等效）
      // 短梁：三角形荷载等效均布 = 5/8 × (qd·a/2) = 5·qd·a/16
      // 长梁：梯形荷载等效均布 = qd·a/2 × (1 − 2α² + α³)，α = a/(2b)
      if(isShortBeam){
        contrib=5*qd*lx2/16;formula='45°法 短向梁 5×qd×a/16';
      }else{
        contrib=qd*lx2/2*(1-2*alpha*alpha+alpha*alpha*alpha);formula='45°法 长向梁 qd×a/2×(1−2α²+α³)';
      }
    }
    total+=contrib;
    detail.push({lx,ly,ratio:ratio.toFixed(2),edge:edgeLabel,alpha:ratio>3?'-':alpha.toFixed(2),contrib,formula,qd:qd.toFixed(2)});
  }
  return {total,detail};
}

function calcWallLoadVal(){
  let ld=state.loads,g=state.section;
  let wt=parseFloat(ld.wallType),wTh=parseFloat(ld.wallThick)/1000;
  let wF=parseFloat(ld.wallFinish);
  let wallArea=wt*wTh+wF*2;
  return wallArea*(state.grid.storyH/1000-g.beamH/1000)*ld.wallReduction;
}
function calcWallLoad(){
  let v=calcWallLoadVal();
  let el=document.getElementById('wallLoadResult');
  if(el) el.textContent='梁上线载 '+v.toFixed(1)+' kN/m';
}

function getSlabTAtCol(ci){
  let cols=getCols(state.grid.xSpans,state.grid.ySpans),slabs=getSlabs(state.grid.xSpans,state.grid.ySpans);
  let c=cols.find(x=>x.id===ci);if(!c) return null;
  for(let s of slabs){
    let near=Math.abs(s.x1-c.x)<1||Math.abs(s.x1+s.lx-c.x)<1||Math.abs(s.y1-c.y)<1||Math.abs(s.y1+s.ly-c.y)<1;
    if(near){let ov=slabOv(s,state.colFloor||1);return ov&&ov.t?ov.t:null;}
  }
  return null;
}
function colCalc(ci){
  let cols=getCols(state.grid.xSpans,state.grid.ySpans);
  let c=cols.find(x=>x.id===ci);
  if(!c) return null;
  let slabs=getSlabs(state.grid.xSpans,state.grid.ySpans);
  let g=state.section,ld=state.loads,m=MAT[g.concGrade];
  // Read per-column override
  let ov=state.colSections?.[ci],oColB=ov?ov.b:g.colB,oColH=ov?ov.h:g.colH;
  let slabTv=getSlabTAtCol(ci)||g.slabT;
  let slabSW=slabTv*26/1000;
  let qd=(slabSW+ld.extraDL)*ld.gammaG+ld.liveLL*ld.gammaQ;
  let tribArea=0,slabDet=[];
  for(let i=0;i<slabs.length;i++){
    let s=slabs[i],contributed=false;
    if(Math.abs(s.x1-c.x)<1&&Math.abs(s.y1-c.y)<1) contributed=true;
    if(Math.abs(s.x1+s.lx-c.x)<1&&Math.abs(s.y1-c.y)<1) contributed=true;
    if(Math.abs(s.x1-c.x)<1&&Math.abs(s.y1+s.ly-c.y)<1) contributed=true;
    if(Math.abs(s.x1+s.lx-c.x)<1&&Math.abs(s.y1+s.ly-c.y)<1) contributed=true;
    if(contributed){
      let a=s.lx*s.ly*0.25/1e6;
      tribArea+=a;
      slabDet.push({id:i+1,lx:s.lx,ly:s.ly,area:a.toFixed(1),contrib:a*qd});
    }
  }
  let NslabPer=tribArea*qd;
  let Nslab=NslabPer*state.grid.nStories;
  let beamSWPer=0,wallPer=0,beamDet=[];
  let beams=getBeams(state.grid.xSpans,state.grid.ySpans);
  for(let b of beams){
    let near=false;
    if(Math.abs(b.x1-c.x)<1&&Math.abs(b.x2-c.x)<1&&Math.abs(b.y1-c.y)<1) near=true;
    if(Math.abs(b.x1-c.x)<1&&Math.abs(b.y1-c.y)<1&&Math.abs(b.y2-c.y)<1) near=true;
    if(Math.abs(b.x2-c.x)<1&&Math.abs(b.y1-c.y)<1&&Math.abs(b.y2-c.y)<1) near=true;
    if(Math.abs(b.x1-c.x)<1&&Math.abs(b.x2-c.x)<1&&Math.abs(b.y2-c.y)<1) near=true; // 竖梁上端
    if(!near) continue;
    let L=Math.abs(b.x2-b.x1||b.y2-b.y1)/1000;
    let bov=beamSec(b.id,state.beamFloor||1);
    let bB=bov?bov.b:g.beamB,bH=bov?bov.h:g.beamH;
    let bsw=bB*bH*26/1e6*L/2, wl=calcWallLoadVal()*L/2;
    beamSWPer+=bsw;wallPer+=wl;
    beamDet.push({id:b.id,b:bB,h:bH,L,beamPer:bsw,wallPer:wl});
  }
  let Nbeam=beamSWPer*state.grid.nStories,Nwall=wallPer*state.grid.nStories;
  let NcolPer=oColB*oColH*state.grid.storyH*26/1e9;
  let Ncol=NcolPer*state.grid.nStories;
  let N=Nslab+Nbeam+Nwall+Ncol;
  // Per-floor breakdown
  let NperFloor=NslabPer+beamSWPer+wallPer+NcolPer;
  let floors=[];
  let cum=0,ns=state.grid.nStories;
  for(let i=0;i<ns;i++){
    cum+=NperFloor;
    floors.push({floor:ns-i, slab:NslabPer, beam:beamSWPer, wall:wallPer, col:NcolPer, sub:NperFloor, cum:cum});
  }
  let l0=state.grid.storyH,lambda=l0/Math.min(oColB,oColH);
  let phi=1.0;
  if(lambda>8) phi=1.0-(lambda-8)*(1.0-0.98)/2;
  if(lambda>10) phi=0.98-(lambda-10)*0.03/2;
  if(lambda>12) phi=0.95-(lambda-12)*0.03/2;
  if(lambda>14) phi=0.92-(lambda-14)*0.05/2;
  if(lambda>16) phi=0.87-(lambda-16)*0.06/2;
  phi=Math.max(0.7,phi);
  let A=oColB*oColH,r=state.colRebar;
  let As=r.longN*Math.PI*Math.pow(r.longD,2)/4;
  let Nu=0.9*phi*(m.fc*A+360*As)/1000;
  let rho=As/A*100;
  let mu=N*1000/(m.fc*A);
  let seismicLimit=[0.65,0.75,0.85,0.90][state.seismicGrade-1];
  return {id:ci,type:c.type,tribArea:tribArea,nStories:state.grid.nStories,
    Nslab:Math.round(Nslab),Nbeam:Math.round(Nbeam),Nwall:Math.round(Nwall),Ncol:Math.round(Ncol),
    NslabPer:NslabPer,beamSWPer,wallPer,NcolPer,NperFloor,floors,
    N:Math.round(N),l0,lambda,phi:phi.toFixed(2),Nu:Math.round(Nu),NuN:(Nu/N).toFixed(2),
    rho:rho.toFixed(2),rhoOK:rho>=0.6&&rho<=5,NuOK:Nu>=N,mu:mu.toFixed(2),muOK:mu<=seismicLimit,seismicLimit,
    concGrade:g.concGrade,fc:m.fc,A,As:Math.round(As),colB:oColB,colH:oColH,storyH:g.storyH,qd:qd.toFixed(2),seismicGrade:state.seismicGrade,
    slabDet,beamDet
  };
}

function init3D(){
  if(typeof THREE==='undefined'){
    if(!init3D._retries) init3D._retries=0;
    if(init3D._retries++>10){showFallback3D();return;}
    setTimeout(init3D,300);return;
  }
  try{
    orbitTarget=new THREE.Vector3(6000,1500,6000);
    orbitSpherical=new THREE.Spherical(16000,Math.PI/4,Math.PI/4);
  }catch(e){console.error('THREE init fail:',e);showFallback3D();return;}
  let el=document.getElementById('view3d');
  if(!el) return setTimeout(init3D,100);
  let w=el.clientWidth||300;
  if(w<50) return setTimeout(init3D,100);
  let h=300;
  el.style.width=w+'px';el.style.height=h+'px';el.style.position='relative';
  try{
    scene=new THREE.Scene();scene.background=new THREE.Color(0xe8f4fd);
    camera=new THREE.PerspectiveCamera(45,w/h,10,50000);
    camera.position.set(12000,9000,14000);
    camera.lookAt(orbitTarget);
    renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
    renderer.setSize(w,h);renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
    renderer.domElement.style.width='100%';renderer.domElement.style.height='100%';
    el.innerHTML='';el.appendChild(renderer.domElement);
  }catch(e){console.error('3D init error:',e);showFallback3D();return;}
  let canvas=renderer.domElement;
  canvas.addEventListener('pointerdown',(e)=>{
    isDragging=true;dragMoved=false;prevMouse.x=e.clientX;prevMouse.y=e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove',(e)=>{
    if(!isDragging) return;
    let dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
    if(Math.abs(dx)+Math.abs(dy)>4) dragMoved=true; // 超过4像素才算拖拽
    prevMouse.x=e.clientX;prevMouse.y=e.clientY;
    if(dragMoved){
      orbitSpherical.theta-=dx*0.005;orbitSpherical.phi-=dy*0.005;
      orbitSpherical.phi=Math.max(0.05,Math.min(Math.PI-0.05,orbitSpherical.phi));  // 允许 360° 旋转
      orbitDirty=true;
    }
  });
  canvas.addEventListener('pointerup',()=>{isDragging=false;});
  canvas.addEventListener('wheel',(e)=>{
    e.preventDefault();orbitSpherical.radius+=e.deltaY*5;
    orbitSpherical.radius=Math.max(3000,Math.min(30000,orbitSpherical.radius));
    orbitDirty=true;
  },{passive:false});
  window.zoom3D=function(dir){if(!orbitSpherical) return;orbitSpherical.radius-=dir*2500;orbitSpherical.radius=Math.max(3000,Math.min(30000,orbitSpherical.radius));orbitDirty=true;};
  canvas.addEventListener('touchstart',(e)=>{if(e.touches.length===1){isDragging=true;dragMoved=false;prevMouse.x=e.touches[0].clientX;prevMouse.y=e.touches[0].clientY;}},{passive:false});
  canvas.addEventListener('touchmove',(e)=>{
    if(!isDragging||e.touches.length!==1) return;
    e.preventDefault();
    let dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;
    if(Math.abs(dx)+Math.abs(dy)>8) dragMoved=true; // 触摸阈值8像素
    prevMouse.x=e.touches[0].clientX;prevMouse.y=e.touches[0].clientY;
    if(dragMoved){
      orbitSpherical.theta-=dx*0.005;orbitSpherical.phi-=dy*0.005;
      orbitSpherical.phi=Math.max(0.05,Math.min(Math.PI-0.05,orbitSpherical.phi));  // 允许 360° 旋转
      orbitDirty=true;
    }
  },{passive:false});
  canvas.addEventListener('touchend',()=>{isDragging=false;});
  raycaster=new THREE.Raycaster();mouse=new THREE.Vector2();
  threeMeshes={cols:[],beams:[],slabs:[]};
  selected3D=null;

  let amb=new THREE.AmbientLight(0xffffff,0.8);
  let dir=new THREE.DirectionalLight(0xffffff,1.2);
  dir.position.set(10000,15000,5000);
  scene.add(amb,dir);

  try{
    let gd=new THREE.GridHelper(16000,20,0xcccccc,0xdddddd);
    gd.position.set(6000,0,6000);scene.add(gd);
  }catch(e){}

  canvas.addEventListener('click',(e)=>{if(!dragMoved)on3DClick(e);dragMoved=false;});
  canvas.addEventListener('touchend',(e)=>{if(!dragMoved)on3DTouch(e);dragMoved=false;});
  window.addEventListener('resize',()=>{
    let el=document.getElementById('view3d');
    if(!el||el.clientWidth===0||!renderer) return;
    let w2=el.clientWidth,h2=300;
    camera.aspect=w2/h2;camera.updateProjectionMatrix();renderer.setSize(w2,h2);
  });
  setTimeout(()=>build3DScene(),50);
  animate3D();
}

function showFallback3D(){
  let el=document.getElementById('view3d');
  if(!el) return;
  el.innerHTML='<div style="padding:16px;text-align:center;color:#378ADD;font-size:12px;">2D轴网示意图 (3D库需联网加载)</div>';
  drawFallbackPlan(el);
}
function drawFallbackPlan(el){
  let hSp=getSpans(state.grid.xSpans),vSp=getSpans(state.grid.ySpans);
  let maxW=el.clientWidth||280,maxH=200;
  let sx=maxW/(hSp[hSp.length-1]||1),sy=maxH/(vSp[vSp.length-1]||1);
  let sc=Math.min(sx,sy)*0.85;
  let ox=(maxW-hSp[hSp.length-1]*sc)/2,oy=(maxH-vSp[vSp.length-1]*sc)/2+20;
  let hl=['A','B','C','D','E'];
  let svg='<svg width="100%" height="'+maxH+'">';
  for(let r=0;r<vSp.length-1;r++) for(let c=0;c<hSp.length-1;c++){
    svg+='<rect x="'+(ox+hSp[c]*sc+2)+'" y="'+(oy+vSp[r]*sc+2)+'" width="'+((hSp[c+1]-hSp[c])*sc-4)+'" height="'+((vSp[r+1]-vSp[r])*sc-4)+'" fill="#378add" opacity="0.1" rx="3"/>';
  }
  for(let r=0;r<vSp.length;r++) svg+='<line x1="'+ox+'" y1="'+(oy+vSp[r]*sc)+'" x2="'+(ox+hSp[hSp.length-1]*sc)+'" y2="'+(oy+vSp[r]*sc)+'" stroke="#1d9e75" stroke-width="2"/>';
  for(let c=0;c<hSp.length;c++) svg+='<line x1="'+(ox+hSp[c]*sc)+'" y1="'+oy+'" x2="'+(ox+hSp[c]*sc)+'" y2="'+(oy+vSp[vSp.length-1]*sc)+'" stroke="#1d9e75" stroke-width="2"/>';
  for(let r=0;r<vSp.length;r++) for(let c=0;c<hSp.length;c++)
    svg+='<circle cx="'+(ox+hSp[c]*sc)+'" cy="'+(oy+vSp[r]*sc)+'" r="4" fill="#D85A30"/>';
  for(let c=0;c<hSp.length;c++) svg+='<text x="'+(ox+hSp[c]*sc)+'" y="'+(oy-4)+'" text-anchor="middle" font-size="10" fill="#534ab7" font-weight="500">'+hl[c]+'</text>';
  svg+='</svg>';
  el.innerHTML+=svg;
}
function animate3D(){
  requestAnimationFrame(animate3D);
  if(!scene||!camera||!renderer) return;
  if(orbitDirty){
    let p=new THREE.Vector3().setFromSpherical(orbitSpherical).add(orbitTarget);
    camera.position.lerp(p,0.3);
    camera.lookAt(orbitTarget);
    if(camera.position.distanceTo(p)<1) orbitDirty=false;
  }
  renderer.render(scene,camera);
}

// Create 3D label sprite (shows section/load info over overridden elements)

function build3DScene(){
  if(!scene||typeof THREE==='undefined') return;
  try{
  let g=state.section;
  let hSp=getSpans(state.grid.xSpans),vSp=getSpans(state.grid.ySpans);
  let storyH=state.grid.storyH,nStories=state.grid.nStories;
  let totalH=storyH*nStories;
  for(let k of ['cols','beams','slabs']) for(let m of threeMeshes[k]){if(m.geometry) m.geometry.dispose();if(m.material) m.material.dispose();scene.remove(m);}
  threeMeshes={cols:[],beams:[],slabs:[]};

  let vs=1; // visual scale factor (1=真实比例, 原 3)

  // Columns — per-element override
  for(let r=0;r<vSp.length;r++){
    for(let c=0;c<hSp.length;c++){
      let cid=colKey(c,r);
      let ov=state.colSections?.[cid];
      let cw=(ov?ov.b:g.colB)*vs,cd=(ov?ov.h:g.colH)*vs;
      let clr=ov ? 0xE24B4A : 0x8B5E3C;
      let geo=new THREE.BoxGeometry(cw,totalH,cd);
      let mat=new THREE.MeshLambertMaterial({color:clr});
      let mesh=new THREE.Mesh(geo,mat);
      mesh.position.set(hSp[c],totalH/2,vSp[r]);
      mesh.userData={type:'col',id:cid};
      scene.add(mesh);threeMeshes.cols.push(mesh);
      if(ov){let lb=makeLabel((ov.b||g.colB)+'x'+(ov.h||g.colH)+'mm','rgba(180,40,40,0.8)');lb.position.set(hSp[c],totalH+600,vSp[r]);scene.add(lb);}
    }
  }

  // Beams + Slabs per floor
  for(let fl=0;fl<nStories;fl++){
    let y=storyH*(fl+1);
    // Horizontal beams
    for(let r=0;r<vSp.length;r++){
      for(let c=0;c<hSp.length-1;c++){
        let bkey=beamKeyH(c,r,fl);
        let ov=state.beamSections?.[bkey];
        let bw=(ov?ov.b:g.beamB)*vs,bh=(ov?ov.h:g.beamH)*vs;
        let clr=ov ? 0xE24B4A : 0x378ADD;
        let mat=new THREE.MeshLambertMaterial({color:clr});
        let geo=new THREE.BoxGeometry(hSp[c+1]-hSp[c],bh,bw);
        let mesh=new THREE.Mesh(geo,mat);
        mesh.position.set((hSp[c]+hSp[c+1])/2,y,vSp[r]);
        mesh.userData={type:'beam',id:bkey};
        scene.add(mesh);threeMeshes.beams.push(mesh);
        if(ov){let pk2=planKey(bkey),wr2=ov.wallReduction!=null?ov.wallReduction:state.loads.wallReduction,wl=calcWallLoadValNoRed()*wr2;let lb=makeLabel(pk2.pid+' '+(ov.b||g.beamB)+'x'+(ov.h||g.beamH)+' w='+wl.toFixed(1),'rgba(180,40,40,0.8)');lb.position.set((hSp[c]+hSp[c+1])/2,y+400,vSp[r]);scene.add(lb);}
      }
    }
    // Vertical beams
    for(let c=0;c<hSp.length;c++){
      for(let r=0;r<vSp.length-1;r++){
        let bkey=beamKeyV(c,r,fl);
        let ov=state.beamSections?.[bkey];
        let bw=(ov?ov.b:g.beamB)*vs,bh=(ov?ov.h:g.beamH)*vs;
        let clr=ov ? 0xE24B4A : 0x378ADD;
        let mat=new THREE.MeshLambertMaterial({color:clr});
        let geo=new THREE.BoxGeometry(bw,bh,vSp[r+1]-vSp[r]);
        let mesh=new THREE.Mesh(geo,mat);
        mesh.position.set(hSp[c],y,(vSp[r]+vSp[r+1])/2);
        mesh.userData={type:'beam',id:bkey};
        scene.add(mesh);threeMeshes.beams.push(mesh);
        if(ov){let pk2=planKey(bkey),wr2=ov.wallReduction!=null?ov.wallReduction:state.loads.wallReduction,wl=calcWallLoadValNoRed()*wr2;let lb=makeLabel(pk2.pid+' '+(ov.b||g.beamB)+'x'+(ov.h||g.beamH)+' w='+wl.toFixed(1),'rgba(180,40,40,0.8)');lb.position.set(hSp[c],y+400,(vSp[r]+vSp[r+1])/2);scene.add(lb);}
      }
    }
    // Slabs
    for(let r=0;r<vSp.length-1;r++){
      for(let c=0;c<hSp.length-1;c++){
        let skey=slabKey(c,r,fl);
        let ov=state.slabOverrides?.[skey];
        let clr=ov ? 0x3B6D11 : 0xCCCCCC;
        let slabGeo=new THREE.PlaneGeometry(hSp[c+1]-hSp[c],vSp[r+1]-vSp[r]);
        let slabM=new THREE.MeshLambertMaterial({color:clr,transparent:true,opacity:0.6,side:THREE.DoubleSide});
        let slabMesh=new THREE.Mesh(slabGeo,slabM);
        slabMesh.rotation.x=-Math.PI/2;
        let ovBH=(ov?.h||state.beamSections?.['bH_'+c+'_'+r+'_'+fl]?.h)||g.beamH;
        slabMesh.position.set((hSp[c]+hSp[c+1])/2,y+ovBH*vs/2,(vSp[r]+vSp[r+1])/2);
        slabMesh.userData={type:'slab',id:skey};
        scene.add(slabMesh);threeMeshes.slabs.push(slabMesh);
        if(ov){let st=ov.t||g.slabT,od=ov.extraDL!=null?ov.extraDL:state.loads.extraDL,ol=ov.liveLL!=null?ov.liveLL:state.loads.liveLL;let lb=makeLabel('板 t='+st+' D='+od.toFixed(1)+' L='+ol.toFixed(1),'rgba(40,120,40,0.8)');lb.position.set((hSp[c]+hSp[c+1])/2,y+ovBH*vs/2+300,(vSp[r]+vSp[r+1])/2);scene.add(lb);}
      }
    }
  }
  }catch(e){console.error('build3DScene error:',e);}
}

// Convert 3D key to plan diagram ID, returns {pid, floor}
function planKey(oid){
  if(!oid) return null;
  let hl=['A','B','C','D','E'],vl=['1','2','3','4','5'];
  if(oid.startsWith('col_')){let p=oid.split('_');return {pid:hl[+p[1]]+vl[+p[2]],floor:0};}
  if(oid.startsWith('bH_')){let p=oid.split('_');return {pid:hl[+p[1]]+'-'+vl[+p[2]],floor:+p[3]};}
  if(oid.startsWith('bV_')){let p=oid.split('_');return {pid:hl[+p[1]]+vl[+p[2]]+'-'+hl[+p[1]]+vl[+p[2]+1],floor:+p[3]};}
  if(oid.startsWith('slab_')){let p=oid.split('_');return {pid:'slab_'+p[1]+'_'+p[2],floor:+p[3],x:+p[1],y:+p[2]};}
  return {pid:oid,floor:0};
}
// Get floor-specific key (3D uses 0-indexed, page selector uses 1-indexed)
function floorKey(planId, selectorFloor){return planId+'_'+(selectorFloor-1);}
// Lookup beam section: selectorFloor is 1-indexed, stored under 0-indexed 3D floor
function beamSec(id, fl){return state.beamSections?.[floorKey(id,fl)]||null;}
// Convert mm coords to slab grid indices (c,r)
function slabIdx(x,y){
  let hSp=getSpans(state.grid.xSpans),vSp=getSpans(state.grid.ySpans);
  let c=hSp.indexOf(x),r=vSp.indexOf(y);
  return {c:Math.max(0,c),r:Math.max(0,r)};
}
// Lookup slab override: uses selector's 1-indexed floor → converts to 0-indexed key
function slabOv(slabObj,fl){
  let si=slabIdx(slabObj.x1,slabObj.y1);
  return state.slabOverrides?.['slab_'+si.c+'_'+si.r+'_'+(fl-1)]||null;
}
window.applyPopup=function(){
  if(!selected3D||!selected3D.userData) return;
  let ud=selected3D.userData,oid=ud.id,pk=planKey(oid),pid=pk.pid,fl3d=pk.floor; // fl3d is 0-indexed
  if(ud.type==='slab'){
    if(!state.slabOverrides) state.slabOverrides={};
    state.slabOverrides[oid]={};
    let t=+document.getElementById('popB').value; if(t>0) state.slabOverrides[oid].t=t;
    let dl=parseFloat(document.getElementById('popDL')?.value); if(!isNaN(dl)) state.slabOverrides[oid].extraDL=dl;
    let ll=parseFloat(document.getElementById('popLL')?.value); if(!isNaN(ll)) state.slabOverrides[oid].liveLL=ll;
  }else if(ud.type==='beam'){
    if(!state.beamSections) state.beamSections={};
    let b=+document.getElementById('popB').value||250,h=+document.getElementById('popH').value||500;
    state.beamSections[oid]={b,h};
    // Store under plan ID with 0-indexed floor: A-1_0, A-1_1, etc.
    if(pid) state.beamSections[pid+'_'+fl3d]={b,h};
    let nw=parseFloat(document.getElementById('popW')?.value);
    if(!isNaN(nw)&&calcWallLoadValNoRed()>0){
      let wr=nw/calcWallLoadValNoRed();
      state.beamSections[oid].wallReduction=wr;
      if(pid) state.beamSections[pid+'_'+fl3d].wallReduction=wr;
    }
  }else{
    if(!state.colSections) state.colSections={};
    let b=+document.getElementById('popB').value||400,h=+document.getElementById('popH').value||400;
    state.colSections[oid]={b,h};
    if(pid) state.colSections[pid]={b,h};
  }
  closePopup();build3DScene();renderAllDiagrams();
};
function calcWallLoadValNoRed(){
  let ld=state.loads,g=state.section;
  let wt=parseFloat(ld.wallType),wTh=parseFloat(ld.wallThick)/1000,wF=parseFloat(ld.wallFinish);
  return (wt*wTh+wF*2)*(state.grid.storyH/1000-g.beamH/1000);
}

function autoDefaultSection(){
  let allSpans=[...state.grid.xSpans,...state.grid.ySpans].filter(x=>x>0);
  if(allSpans.length===0) return;
  let maxSpan=Math.max(...allSpans);
  let minSpan=Math.min(...allSpans);
  // 梁高=最大轴网/10, 50mm为调整级别
  let beamH=Math.max(300,Math.round(maxSpan/10/50)*50);
  // 梁宽=梁高/2
  let beamB=Math.max(200,Math.round(beamH/2/10)*10);
  // 板厚=最小跨度/40
  let slabT=Math.max(80,Math.round(minSpan/40));
  state.section.beamH=beamH;
  state.section.beamB=beamB;
  state.section.slabT=slabT;
  let bB=document.getElementById('beamB'),bH=document.getElementById('beamH'),sT=document.getElementById('slabT');
  if(bB) bB.value=beamB;
  if(bH) bH.value=beamH;
  if(sT) sT.value=slabT;
  let sw=document.getElementById('slabSelfWt');if(sw) sw.textContent=(slabT*26/1000).toFixed(2);
}

function drawSlabMomentDiagram(r){
  let _id=(drawSlabMomentDiagram._c=(drawSlabMomentDiagram._c||0)+1);

  let red='#d32f2f',dk='#555',fs=11,grey='#999',axC='#2b6cb0';

  let tHinge=!r.boundary.top,bHinge=!r.boundary.bot,lHinge=!r.boundary.left,rHinge=!r.boundary.right;

  s+='<rect x="'+pad+'" y="'+pad+'" width="'+rw+'" height="'+rh+'" fill="#e8e0d0" stroke="#888" stroke-width="1.5"/>';
  s+='<text x="'+(w/2)+'" y="'+(h/2+5)+'" text-anchor="middle" font-size="13" fill="#888" font-weight="500">'+r.lx_m.toFixed(1)+'×'+r.ly_m.toFixed(1)+'m</text>';
  s+='<text x="'+(w/2)+'" y="'+(pad-20)+'" text-anchor="middle" font-size="'+fs+'">My上='+lbl(r.Mb.MyT_sup,tHinge)+' kN·m/m</text>';
  s+='<text x="'+(w/2)+'" y="'+(h-pad+36)+'" text-anchor="middle" font-size="'+fs+'">My下='+lbl(r.Mb.MyB_sup,bHinge)+' kN·m/m</text>';
  s+='<text x="'+(pad-18)+'" y="'+(h/2)+'" transform="rotate(-90 '+(pad-18)+' '+(h/2)+')" text-anchor="middle" font-size="'+fs+'">Mx左='+lbl(r.Mb.MxL_sup,lHinge)+' kN·m/m</text>';
  s+='<text x="'+(w-pad+18)+'" y="'+(h/2)+'" transform="rotate(-90 '+(w-pad+18)+' '+(h/2)+')" text-anchor="middle" font-size="'+fs+'">Mx右='+lbl(r.Mb.MxR_sup,rHinge)+' kN·m/m</text>';
  s+='<text x="'+(w/2)+'" y="'+(h/2-14)+'" text-anchor="middle" font-size="'+fs+'">Mx中='+lbl(Math.abs(r.Mb.Mx_mid),false)+' kN·m/m</text>';
  s+='<text x="'+(w/2)+'" y="'+(h/2+20)+'" text-anchor="middle" font-size="'+fs+'">My中='+lbl(Math.abs(r.Mb.My_mid),false)+' kN·m/m</text>';
  // X向箭头（水平，沿板底内侧）
  s+='<line x1="'+(pad+14)+'" y1="'+(h-pad-12)+'" x2="'+(pad+92)+'" y2="'+(h-pad-12)+'" stroke="'+axC+'" stroke-width="1.6" marker-start="url(#ah'+_id+')" marker-end="url(#ah'+_id+')"/>';
  s+='<text x="'+(pad+53)+'" y="'+(h-pad-16)+'" text-anchor="middle" font-size="10" fill="'+axC+'" font-weight="600">X向</text>';
  // Y向箭头（竖直，沿板左内侧）
  s+='<line x1="'+(pad+12)+'" y1="'+(pad+14)+'" x2="'+(pad+12)+'" y2="'+(pad+92)+'" stroke="'+axC+'" stroke-width="1.6" marker-start="url(#ah'+_id+')" marker-end="url(#ah'+_id+')"/>';
  s+='<text x="'+(pad+16)+'" y="'+(pad+56)+'" transform="rotate(-90 '+(pad+16)+' '+(pad+56)+')" text-anchor="middle" font-size="10" fill="'+axC+'" font-weight="600">Y向</text>';
  s+='<text x="'+(w/2)+'" y="'+(h-5)+'" text-anchor="middle" font-size="8" fill="#aaa">红=有值 | 灰=0(N/A)</text>';
  s+='</svg></div>';
  return s;
}

function drawSlabPlan(selIdx){
  let svg=document.getElementById('slab-diagram');
  let hSp=getSpans(state.grid.xSpans),vSp=getSpans(state.grid.ySpans);
  let slabs=getSlabs(state.grid.xSpans,state.grid.ySpans);
  let maxW=svg.clientWidth-16,maxH=160;
  let scaleX=maxW/(hSp[hSp.length-1]||1),scaleY=maxH/(vSp[vSp.length-1]||1);
  let sc=Math.min(scaleX,scaleY);
  let ox=8,oy=20,w=hSp[hSp.length-1]*sc,h2=vSp[vSp.length-1]*sc;
  let hl=['A','B','C','D','E'],vl=['1','2','3','4','5'];
  let g=state.section;
  let html='<svg width="100%" height="'+(h2+90)+'" viewBox="0 0 '+(w+70)+' '+(h2+90)+'">';
  // Grid lines
  for(let r=0;r<vSp.length;r++) html+='<line x1="'+ox+'" y1="'+(oy+vSp[r]*sc)+'" x2="'+(ox+w)+'" y2="'+(oy+vSp[r]*sc)+'" stroke="#ccd" stroke-width="0.5" '+(r===0||r===vSp.length-1?'stroke-dasharray="3,2"':'')+'/>';
  for(let c=0;c<hSp.length;c++) html+='<line x1="'+(ox+hSp[c]*sc)+'" y1="'+oy+'" x2="'+(ox+hSp[c]*sc)+'" y2="'+(oy+h2)+'" stroke="#ccd" stroke-width="0.5" '+(c===0||c===hSp.length-1?'stroke-dasharray="3,2"':'')+'/>';
  // Axis labels with dimensions
  for(let c=0;c<hSp.length;c++){
    html+='<text x="'+(ox+hSp[c]*sc)+'" y="'+(oy-4)+'" text-anchor="middle" font-size="9" fill="#534ab7" font-weight="500">'+hl[c]+'</text>';
  }
  // Span dimensions between axes
  for(let c=0;c<hSp.length-1;c++){
    let span=(hSp[c+1]-hSp[c])/1000;
    html+='<text x="'+(ox+(hSp[c]+hSp[c+1])*sc/2)+'" y="'+(oy-4)+'" text-anchor="middle" font-size="7" fill="var(--text3)">'+span.toFixed(1)+'m</text>';
  }
  for(let r=0;r<vSp.length;r++) html+='<text x="'+(ox-12)+'" y="'+(oy+vSp[r]*sc+4)+'" font-size="9" fill="#534ab7">'+vl[r]+'</text>';
  for(let r=0;r<vSp.length-1;r++){
    let span=(vSp[r+1]-vSp[r])/1000;
    html+='<text x="'+(ox-12)+'" y="'+(oy+(vSp[r]+vSp[r+1])*sc/2+4)+'" font-size="7" fill="var(--text3)">'+span.toFixed(1)+'</text>';
  }
  // Slab panels
  for(let i=0;i<slabs.length;i++){
    let s=slabs[i];
    let fill=i===selIdx?'#fff':('#edf4fb'),stroke=i===selIdx?'#378ADD':'none',sw=i===selIdx?'1.5':'0';
    html+='<rect x="'+(ox+s.x1*sc+2)+'" y="'+(oy+s.y1*sc+2)+'" width="'+(s.lx*sc-4)+'" height="'+(s.ly*sc-4)+'" rx="3" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" onclick="selectSlab('+i+')"/>';
    html+='<text x="'+(ox+s.x1*sc+s.lx*sc/2)+'" y="'+(oy+s.y1*sc+s.ly*sc/2+4)+'" text-anchor="middle" font-size="10" fill="'+ (i===selIdx?'#378ADD':'#378ADD')+'" font-weight="'+(i===selIdx?'500':'400')+'">'+(state.slabFloor||1)+'层 板'+(i+1)+'</text>';
    let ovS=slabOv(s,state.slabFloor||1);
    let t=(ovS&&ovS.t)?ovS.t:g.slabT;
    html+='<text x="'+(ox+s.x1*sc+s.lx*sc/2)+'" y="'+(oy+s.y1*sc+s.ly*sc/2+16)+'" text-anchor="middle" font-size="8" fill="var(--text3)">t='+t+'mm</text>';
    if(i===selIdx){
      let b=slabBoundary(i);
      // Top edge
      html+='<text x="'+(ox+s.x1*sc+s.lx*sc/2)+'" y="'+(oy+s.y1*sc-2)+'" text-anchor="middle" font-size="9" fill="'+(b.top?'#1d9e75':'#d85a30')+'" font-weight="500">'+(b.top?'固结':'铰接')+'</text>';
      // Bottom edge
      html+='<text x="'+(ox+s.x1*sc+s.lx*sc/2)+'" y="'+(oy+s.y1*sc+s.ly*sc+12)+'" text-anchor="middle" font-size="9" fill="'+(b.bot?'#1d9e75':'#d85a30')+'" font-weight="500">'+(b.bot?'固结':'铰接')+'</text>';
      // Left edge
      html+='<text x="'+(ox+s.x1*sc-6)+'" y="'+(oy+s.y1*sc+s.ly*sc/2+3)+'" font-size="9" fill="'+(b.left?'#1d9e75':'#d85a30')+'" font-weight="500">'+(b.left?'固结':'铰接')+'</text>';
      // Right edge
      html+='<text x="'+(ox+s.x1*sc+s.lx*sc-2)+'" y="'+(oy+s.y1*sc+s.ly*sc/2+3)+'" text-anchor="end" font-size="9" fill="'+(b.right?'#1d9e75':'#d85a30')+'" font-weight="500">'+(b.right?'固结':'铰接')+'</text>';
    }
  }
  html+='</svg>';
  svg.innerHTML=html;
}

    html+='<text x="'+(ox+(hSp[c]+hSp[c+1])*sc/2)+'" y="'+(oy-4)+'" text-anchor="middle" font-size="7" fill="var(--text3)">'+span.toFixed(1)+'m</text>';
  }
  for(let r=0;r<vSp.length-1;r++){
    let span=(vSp[r+1]-vSp[r])/1000;
    html+='<text x="'+(ox-12)+'" y="'+(oy+(vSp[r]+vSp[r+1])*sc/2+4)+'" font-size="7" fill="var(--text3)">'+span.toFixed(1)+'</text>';
  }
  // Beam lines
  let beFl=state.beamFloor||1,flPrefix=beFl+'层 ';
  for(let b of beams){
    let sel=b.id===selId,clr=sel?'#378ADD':'#1d9e75',sw=sel?'5':'3';
    let mx=(b.x1+b.x2)*sc/2+ox,my=(b.y1+b.y2)*sc/2+oy;
    let lx=Math.abs(b.x2-b.x1)*sc,ly=Math.abs(b.y2-b.y1)*sc;
    let bov=beamSec(b.id,beFl);
    let bW=bov?bov.b:g.beamB,bH=bov?bov.h:g.beamH;
    html+='<text x="'+mx+'" y="'+(my+10)+'" text-anchor="middle" font-size="6" fill="var(--text3)" pointer-events="none">'+bW+'x'+bH+'</text>';
    html+='<rect x="'+(ox+b.x1*sc-10)+'" y="'+(oy+Math.min(b.y1,b.y2)*sc-10)+'" width="'+ (lx+20)+'" height="'+ (ly+20)+'" fill="transparent" onclick="selectBeam(\''+b.id+'\')"/>';
    html+='<line x1="'+(ox+b.x1*sc)+'" y1="'+(oy+b.y1*sc)+'" x2="'+(ox+b.x2*sc)+'" y2="'+(oy+b.y2*sc)+'" stroke="'+clr+'" stroke-width="'+sw+'" pointer-events="none"/>';
    if(sel){
      let L=Math.sqrt(Math.pow(b.x2-b.x1,2)+Math.pow(b.y2-b.y1,2))/1000;
      html+='<text x="'+(ox+(b.x1+b.x2)*sc/2)+'" y="'+(oy+(b.y1+b.y2)*sc/2-8)+'" text-anchor="middle" font-size="9" fill="#378ADD" font-weight="500" pointer-events="none">'+flPrefix+b.id+' L='+L.toFixed(1)+'m</text>';
      html+='<text x="'+(ox+(b.x1+b.x2)*sc/2)+'" y="'+(oy+(b.y1+b.y2)*sc/2+4)+'" text-anchor="middle" font-size="7" fill="var(--text3)" pointer-events="none">截面 '+bW+'x'+bH+'</text>';
    }
  }
  html+='</svg>';svg.innerHTML=html;
}
window.selectBeam=function(id){state.beamSel=id;renderBeamPage();};

function renderColPage(){

  drawColPlan(state.colSel);
  let r=colCalc(state.colSel);
  if(!r) return;
  document.getElementById('col-info').textContent=state.colSel+' '+r.type.toUpperCase()+' 从属'+r.tribArea.toFixed(1)+'m²';
  let fd=document.getElementById('col-force-detail');

    '<tr><td>第'+f.floor+'层</td><td>楼面 '+Math.round(f.slab)+'</td><td>梁 '+Math.round(f.beam)+'</td><td>墙 '+Math.round(f.wall)+'</td><td>柱 '+Math.round(f.col)+'</td><td>= '+Math.round(f.sub)+'</td><td>累计 '+Math.round(f.cum)+'</td></tr>'

    '<table style="width:100%;font-size:10px;line-height:1.8;"><tr><td></td><td>楼面</td><td>梁重</td><td>墙载</td><td>柱重</td><td>本层</td><td>累计</td></tr>'+

    '<div class="metric"><div class="metric-label" style="font-size:10px;">钢筋承压 <span style="color:#999;">f<sub>y</sub>′·A<sub>s</sub></span></div><div style="font-size:11px">'+(360*r.As/1000).toFixed(0)+' kN</div><div style="font-size:9px;color:#888;">= 360×'+(r.As/1000).toFixed(2)+'cm²</div></div>'+
    '<div class="metric"><div class="metric-label" style="font-size:10px;">整体承压 <span style="color:#999;">N<sub>u</sub>=0.9φ(…)</span></div><div style="font-size:11px;font-weight:600;color:var(--blue)">'+r.Nu+' kN</div><div style="font-size:9px;color:#888;">= 0.9×'+r.phi+'×('+(r.fc*r.A/1000).toFixed(0)+'+'+(360*r.As/1000).toFixed(0)+')</div></div></div>'+
    '<div class="row" style="margin-top:4px;"><div class="metric"><div class="metric-label">N/Nu</div><div class="metric-val" style="color:var(--green)">'+(1/r.NuN).toFixed(3)+'</div></div>'+

function drawColPlan(selId){
  let svg=document.getElementById('col-diagram');
  let hSp=getSpans(state.grid.xSpans),vSp=getSpans(state.grid.ySpans);
  let cols=getCols(state.grid.xSpans,state.grid.ySpans);
  let g=state.section;
  let maxW=svg.clientWidth-16,maxH=160;
  let scaleX=maxW/(hSp[hSp.length-1]||1),scaleY=maxH/(vSp[vSp.length-1]||1);
  let sc=Math.min(scaleX,scaleY),ox=8,oy=20;
  let w=hSp[hSp.length-1]*sc,h2=vSp[vSp.length-1]*sc;
  let html='<svg width="100%" height="'+(h2+70)+'" viewBox="0 0 '+(w+40)+' '+(h2+70)+'">';
  // Grid lines
  for(let r=0;r<vSp.length;r++) html+='<line x1="'+ox+'" y1="'+(oy+vSp[r]*sc)+'" x2="'+(ox+w)+'" y2="'+(oy+vSp[r]*sc)+'" stroke="#ccd" stroke-width="0.5"/>';
  for(let c=0;c<hSp.length;c++) html+='<line x1="'+(ox+hSp[c]*sc)+'" y1="'+oy+'" x2="'+(ox+hSp[c]*sc)+'" y2="'+(oy+h2)+'" stroke="#ccd" stroke-width="0.5"/>';
  // Axis labels
  let hl=['A','B','C','D','E'],vl=['1','2','3','4','5'];
  for(let c=0;c<hSp.length;c++) html+='<text x="'+(ox+hSp[c]*sc)+'" y="'+(oy-4)+'" text-anchor="middle" font-size="9" fill="#534ab7">'+hl[c]+'</text>';
  for(let r=0;r<vSp.length;r++) html+='<text x="'+(ox-12)+'" y="'+(oy+vSp[r]*sc+4)+'" font-size="9" fill="#534ab7">'+vl[r]+'</text>';
  for(let c of cols){
    let sel=c.id===selId,size=sel?20:14,cx=ox+c.x*sc,cy=oy+c.y*sc;
    let fill=sel?'#378ADD':(c.type==='interior'?'#e6f1fb':'#faeeda');
    let stroke=sel?'#185FA5':(c.type==='interior'?'#378ADD':'#D85A30');
    let hitSz=26;
    let cov=state.colSections?.[c.id];
    let cW=cov?cov.b:g.colB,cH=cov?cov.h:g.colH;
    html+='<rect x="'+(cx-hitSz/2)+'" y="'+(cy-hitSz/2)+'" width="'+hitSz+'" height="'+hitSz+'" fill="transparent" onclick="selectCol(\''+c.id+'\')"/>';
    html+='<rect x="'+(cx-size/2)+'" y="'+(cy-size/2)+'" width="'+size+'" height="'+size+'" rx="3" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sel?'1.5':'0.5')+'" pointer-events="none"/>';
    if(sel) html+='<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="8" fill="#fff" font-weight="500" pointer-events="none">'+c.id+'</text>';
    html+='<text x="'+cx+'" y="'+(cy+size/2+12)+'" text-anchor="middle" font-size="7" fill="'+ (c.type==='interior'?'#378ADD':'#D85A30')+'" pointer-events="none">'+(c.type==='corner'?'角':c.type==='edge'?'边':'中')+' '+cW+'x'+cH+'</text>';
  }
  html+='</svg>';svg.innerHTML=html;
}
window.selectCol=function(id){state.colSel=id;renderColPage();};

      '</table>');
    html=rows.join('');
  } else if(type==='beam'){

      s+='<text x="'+(pad+bw*sc+3)+'" y="'+(pad+bh*sc/2+3)+'" font-size="6" fill="#555">'+bh+'</text>';
      div.innerHTML='<svg width="'+svgW+'" height="'+svgH+'" style="width:'+svgW+'px;height:'+svgH+'px;display:block;">'+s+'</svg>';
      let lb=document.getElementById('xslab_'+k);if(lb)lb.innerHTML='上d'+d1+'×'+n1+(n2?'+d'+d2+'×'+n2:'')+' 下d'+bd1+'×'+bn1+(bn2?'+d'+bd2+'×'+bn2:'');
    }
    let da=data.A,sNet=(bw-2*c-2*ds-da.d1*da.n1)/(Math.max(da.n1-1,1));
    let sMin=Math.max(25,da.d1),ok=sNet>=sMin;
    let el=document.getElementById('xs_spc');
    if(el)el.innerHTML='s='+sNet.toFixed(0)+'/'+sMin+' <b style="color:'+(ok?'#3B6D11':'#d32f2f')+'">'+(ok?'✓':'✗')+'</b>';
  };
  // Build one section card with inputs below
  function secCard(id,clr,d1,n1,d2,n2,db1,nb1,db2,nb2,prefix){
    let sid='xssec_'+id;
    return '<div style="flex:1;min-width:80px;text-align:center;margin:2px;padding:2px;background:#f8f6f0;border-radius:4px;">'+
      '<div style="color:'+clr+';font-weight:600;font-size:10px;">'+id+'</div>'+
      '<div id="'+sid+'" style="width:'+svgW+'px;height:'+svgH+'px;max-width:100%;background:white;border:1px solid #ccc;border-radius:2px;display:inline-block;">'+drawSec(d1,n1,d2,n2,db1,nb1,db2,nb2,rb.stirD)+'</div>'+
      '<div style="font-size:8px;margin:2px 0;" id="xslab_'+id+'">上d'+d1+'×'+n1+(n2?'+d'+d2+'×'+n2:'')+' 下d'+db1+'×'+nb1+(nb2?'+d'+db2+'×'+nb2:'')+'</div>'+
      '<div style="font-size:10px;">上1d<input id="xs_'+prefix+'TopD" value="'+d1+'" class="xs-d" type="text" inputmode="decimal" oninput="_updBeamSec()">×<input id="xs_'+prefix+'TopN" value="'+n1+'" class="xs-n" type="number" oninput="_updBeamSec()" onchange="_updBeamSec()"></div>'+
      '<div style="font-size:10px;">上2d<input id="xs_'+prefix+'Top2D" value="'+d2+'" class="xs-d" type="text" inputmode="decimal" oninput="_updBeamSec()">×<input id="xs_'+prefix+'Top2N" value="'+n2+'" class="xs-n" type="number" oninput="_updBeamSec()" onchange="_updBeamSec()"> (0=无)</div>'+
      '<div style="font-size:10px;">下1d<input id="xs_'+prefix+'BotD" value="'+db1+'" class="xs-d" type="text" inputmode="decimal" oninput="_updBeamSec()">×<input id="xs_'+prefix+'BotN" value="'+nb1+'" class="xs-n" type="number" oninput="_updBeamSec()" onchange="_updBeamSec()"></div>'+
      '<div style="font-size:10px;">下2d<input id="xs_'+prefix+'Bot2D" value="'+db2+'" class="xs-d" type="text" inputmode="decimal" oninput="_updBeamSec()">×<input id="xs_'+prefix+'Bot2N" value="'+nb2+'" class="xs-n" type="number" oninput="_updBeamSec()" onchange="_updBeamSec()"> (0=无)</div></div>';
  }
  xs.innerHTML=
    '<div style="font-size:10px;margin-bottom:3px;">b='+bw+' h='+bh+' c='+c+' <span id="xs_spc"></span></div>'+
    '<input type="hidden" id="xs__bw" value="'+bw+'"><input type="hidden" id="xs__bh" value="'+bh+'">'+
    '<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:4px;">'+
    secCard('A','#e24b4a',rb.sup1TopD,rb.sup1TopN,rb.sup1Top2D||14,rb.sup1Top2N||0,rb.sup1BotD,rb.sup1BotN,rb.sup1Bot2D||14,rb.sup1Bot2N||0,'sup1')+
    secCard('M','#ba7517',rb.midTopD,rb.midTopN,rb.midTop2D||14,rb.midTop2N||0,rb.midBotD,rb.midBotN,rb.midBot2D||14,rb.midBot2N||0,'mid')+
    secCard('B','#e24b4a',rb.sup2TopD,rb.sup2TopN,rb.sup2Top2D||14,rb.sup2Top2N||0,rb.sup1BotD,rb.sup1BotN,rb.sup1Bot2D||14,rb.sup1Bot2N||0,'sup2')+
    '</div>'+
    '<div style="text-align:center;font-size:10px;">箍d<input id="xs_stirD" value="'+rb.stirD+'" class="xs-d" type="text" inputmode="decimal" oninput="_updBeamSec()">@<input id="xs_stirS" value="'+rb.stirS+'" class="xs-d" type="text" inputmode="decimal"></div>'+
    '<div style="text-align:center;margin-top:6px;font-size:9px;color:var(--text3)">示意图即时更新 | 确认后点击应用</div>'+
    '<div style="text-align:center;margin-top:4px;">'+
    '<button class="btn btn-primary btn-sm" onclick="applyXSRebar()">应用</button> <button class="btn btn-sm" onclick="closeXS()">关闭</button></div>';
  document.getElementById('xs-modal').classList.add('active');
  setTimeout(window._updBeamSec,50);
};
window.applyXSRebar=function(){
  let rb=state.beamRebar;
  let gv=(k)=>{let e=document.getElementById('xs_'+k);return e?Math.max(+e.value||0,0):0;};
  rb.sup1TopD=gv('sup1TopD')||20;rb.sup1TopN=gv('sup1TopN')||4;rb.sup1Top2D=gv('sup1Top2D')||0;rb.sup1Top2N=gv('sup1Top2N')||0;
  rb.sup1BotD=gv('sup1BotD')||18;rb.sup1BotN=gv('sup1BotN')||2;rb.sup1Bot2D=gv('sup1Bot2D')||0;rb.sup1Bot2N=gv('sup1Bot2N')||0;
  rb.midTopD=gv('midTopD')||16;rb.midTopN=gv('midTopN')||2;rb.midTop2D=gv('midTop2D')||0;rb.midTop2N=gv('midTop2N')||0;
  rb.midBotD=gv('midBotD')||20;rb.midBotN=gv('midBotN')||4;rb.midBot2D=gv('midBot2D')||0;rb.midBot2N=gv('midBot2N')||0;
  rb.sup2TopD=gv('sup2TopD')||20;rb.sup2TopN=gv('sup2TopN')||4;rb.sup2Top2D=gv('sup2Top2D')||0;rb.sup2Top2N=gv('sup2Top2N')||0;
  rb.sup2BotD=gv('sup2BotD')||18;rb.sup2BotN=gv('sup2BotN')||2;rb.sup2Bot2D=gv('sup2Bot2D')||0;rb.sup2Bot2N=gv('sup2Bot2N')||0;
  rb.stirD=gv('stirD')||8;rb.stirS=gv('stirS')||200;

window.showColXS=function(){
  let r=colCalc(state.colSel); if(!r) return;
  let cr=state.colRebar,g=state.section;
  let ov=state.colSections?.[state.colSel];
    let cw=ov?ov.b:g.colB,ch=ov?ov.h:g.colH;
    let c=20,ds=cr.stirD;
    let cornerD=cr.cornerD||cr.longD||25,sideXD=cr.sideXD||cr.longD||25,sideYD=cr.sideYD||cr.longD||25;
    let sideXN=cr.sideXN||0,sideYN=cr.sideYN||0;
    document.getElementById('xs-title').textContent='柱配筋 '+state.colSel+' '+cw+'x'+ch;
    let xs=document.getElementById('xs-content');
  let sc=0.4,pad=8,svgW=cw*sc+pad*2,svgH=ch*sc+pad*2;

  function drawCol(cD,sxd,sxn,syd,syn,stirD){
    let ds2=stirD||8; let s='';
    let startX=pad+(c+ds2)*sc,endX=pad+cw*sc-(c+ds2)*sc;
    let startY=pad+(c+ds2)*sc,endY=pad+ch*sc-(c+ds2)*sc;
    // concrete
    s+='<rect x="'+pad+'" y="'+pad+'" width="'+(cw*sc)+'" height="'+(ch*sc)+'" fill="#e8e0d0" stroke="#888" stroke-width="1"/>';
    // stirrup
    s+='<rect x="'+(pad+c*sc)+'" y="'+(pad+c*sc)+'" width="'+(cw*sc-2*c*sc)+'" height="'+(ch*sc-2*c*sc)+'" fill="none" stroke="#639922" stroke-width="0.8"/>';
    // 4 corners
    [[startX,startY],[endX,startY],[startX,endY],[endX,endY]].forEach(([x,y])=>{
      s+='<circle cx="'+x+'" cy="'+y+'" r="'+(cD*sc/2)+'" fill="none" stroke="#e24b4a" stroke-width="1.5"/>';
      s+='<circle cx="'+x+'" cy="'+y+'" r="'+(cD*sc/3)+'" fill="#e24b4a"/>';
    });
    // X side bars (top & bottom)
    let nX=Math.max(sxn,0);
    for(let j=0;j<2;j++){
      let y=j===0?startY:endY;
      for(let i=0;i<nX;i++){
        let x=startX+(i+1)*(endX-startX)/(nX+1);
        s+='<circle cx="'+x+'" cy="'+y+'" r="'+(sxd*sc/2)+'" fill="none" stroke="#378add" stroke-width="1.3"/>';
        s+='<circle cx="'+x+'" cy="'+y+'" r="'+(sxd*sc/3)+'" fill="#378add"/>';
      }
    }
    // Y side bars (left & right)
    let nY=Math.max(syn,0);
    for(let j=0;j<2;j++){
      let x=j===0?startX:endX;
      for(let i=0;i<nY;i++){
        let y=startY+(i+1)*(endY-startY)/(nY+1);
        s+='<circle cx="'+x+'" cy="'+y+'" r="'+(syd*sc/2)+'" fill="none" stroke="#378add" stroke-width="1.3"/>';
        s+='<circle cx="'+x+'" cy="'+y+'" r="'+(syd*sc/3)+'" fill="#378add"/>';
      }
    }
    s+='<text x="'+(pad+cw*sc/2)+'" y="'+(pad-2)+'" text-anchor="middle" font-size="7" fill="#555">'+cw+'</text>';
    s+='<text x="'+(pad+cw*sc+3)+'" y="'+(pad+ch*sc/2+3)+'" font-size="7" fill="#555">'+ch+'</text>';
    return s;
  }
  window._updCol=function(){
    let cd=gvC('cxs_cornerD')||25,sxd=gvC('cxs_sideXD')||25,syd=gvC('cxs_sideYD')||25;
    let sxn=+document.getElementById('cxs_sideXN').value||0,syn=+document.getElementById('cxs_sideYN').value||0;
    let ds2=gvC('cxs_stirD')||8,total=4+sxn*2+syn*2;
    let As=Math.PI/4*(cd*cd*4+sxd*sxd*sxn*2+syd*syd*syn*2);
    let div=document.getElementById('csvg');if(div)div.innerHTML='<svg width="'+svgW+'" height="'+svgH+'" style="width:'+svgW+'px;height:'+svgH+'px;display:block;">'+drawCol(cd,sxd,sxn,syd,syn,ds2)+'</svg>';
    let sNet=(cw-2*c-2*ds2-cd*(sxn+2))/(Math.max(sxn+1,1));
    let sMin=Math.max(25,sxd),spOk=sNet>=sMin;
    let el=document.getElementById('cinfo');
    if(el)el.innerHTML=total+'根 As='+Math.round(As)+' ρ='+(As/(cw*ch)*100).toFixed(2)+'% | s='+sNet.toFixed(0)+'/'+sMin+' <b style="color:'+(spOk?'#3B6D11':'#d32f2f')+'">'+(spOk?'✓':'✗')+'</b>';
  };
  function gvC(k){let e=document.getElementById('cxs_'+k);return e?+e.value:0;}

  xs.innerHTML=
    '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;">'+
    '<div style="text-align:center;flex:0 0 auto;">'+
    '<div id="csvg" style="width:'+svgW+'px;height:'+svgH+'px;max-width:100%;background:white;border:1px solid #ccc;border-radius:2px;display:inline-block;">'+drawCol(cornerD,sideXD,sideXN,sideYD,sideYN,ds)+'</div>'+
    '<div style="font-size:9px;margin-top:2px;" id="cinfo"></div>'+
    '<div style="font-size:8px;color:var(--text2)">∎角筋 <span style="color:#378add">●侧筋</span></div></div>'+
    '<div style="flex:1;min-width:160px;">'+
    '<table style="width:100%;font-size:11px;line-height:2.4;">'+
    '<tr><td>角筋d</td><td><input id="cxs_cornerD" value="'+cornerD+'" class="xs-d" type="text" inputmode="decimal" oninput="_updCol()"> ×4</td></tr>'+
    '<tr><td>X侧筋d</td><td><input id="cxs_sideXD" value="'+sideXD+'" class="xs-d" type="text" inputmode="decimal" oninput="_updCol()"> 每边根 <input id="cxs_sideXN" value="'+sideXN+'" class="xs-n" type="number" oninput="_updCol()"></td></tr>'+
    '<tr><td>Y侧筋d</td><td><input id="cxs_sideYD" value="'+sideYD+'" class="xs-d" type="text" inputmode="decimal" oninput="_updCol()"> 每边根 <input id="cxs_sideYN" value="'+sideYN+'" class="xs-n" type="number" oninput="_updCol()"></td></tr>'+
    '<tr><td>箍筋d</td><td><input id="cxs_stirD" value="'+ds+'" class="xs-d" type="text" inputmode="decimal"> @ <input id="cxs_stirS" value="'+cr.stirS+'" class="xs-d" type="text" inputmode="decimal"></td></tr>'+
    '</table>'+
    '<div style="font-size:9px;color:var(--text3);margin-top:2px;">即时更新 | 确认后点击应用</div>'+
    '<div style="margin-top:4px;">'+
    '<button class="btn btn-primary btn-sm" onclick="applyColRebar()">应用</button> <button class="btn btn-sm" onclick="closeXS()">关闭</button></div></div></div>';
  document.getElementById('xs-modal').classList.add('active');
  setTimeout(window._updCol,50);
};
window.applyColRebar=function(){
  let cr=state.colRebar,v=(k)=>{let e=document.getElementById('cxs_'+k);return e?+e.value:0;};
  cr.cornerD=v('cornerD')||25;cr.sideXD=v('sideXD')||25;cr.sideYD=v('sideYD')||25;
  cr.sideXN=v('sideXN')||0;cr.sideYN=v('sideYN')||0;
  cr.longD=cr.cornerD;cr.longN=4+(cr.sideXN||0)*2+(cr.sideYN||0)*2;
  cr.stirD=v('stirD')||8;cr.stirS=v('stirS')||200;
  closeXS();renderColPage();
};
